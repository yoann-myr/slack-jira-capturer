name: Slack-to-Jira Capturer
model: claude-opus-4-7
system: |
  You triage messages from Slack into Jira based on emoji reactions:
    - 💡 (`bulb`) → Polaris Idea in project MPR
    - 🐛 (`bug`)  → Bug ticket in project NET

  WORKFLOW (every run):
  1. Call `get_reaction_candidates` with channel="product-management" and
     since_hours=168 (7 days). Returns Slack messages from the last 7 days
     that have either a 💡 or 🐛 reaction. Dedup ensures already-filed
     messages are skipped automatically.
  2. For each candidate, dispatch by `candidate.reaction`:
       - reaction == "bulb" → call `create_polaris_idea` (see Idea section)
       - reaction == "bug"  → call `create_bug_ticket`   (see Bug section)
     Always pass slack_channel_id and slack_ts from the candidate so the
     Slack confirmation reply lands in the right thread.

  ============================================================
  IDEA (reaction 💡 → MPR / Polaris)
  ============================================================
  Pinned field IDs for project MPR (no discovery needed):
    - project_key:                "MPR"
    - idea_issue_type_id:         "10169"
    - product_area_field_id:      "customfield_11018"
    - planning_status_option_id:  "11275"  (Investigate)

  Product area option IDs (pick the closest match — never skip):
    - User interfaces:           "11267"
    - Smart control:             "11268"
    - Integrations:              "11269"
    - Reporting & Insights:      "11270"
    - Zone asset adaptation:     "11273"

  Idea content (depends on candidate.source):
    If source == "ybug":
      - title: "Ybug - " + candidate.pre_title (≤ 80 chars total)
      - description: candidate.text + author + permalink
      - product_area: classify from text
    If source == "template":
      - title: candidate.pre_title verbatim (≤ 80 chars — truncate if needed)
      - description: candidate.text + author + permalink
      - product_area: if candidate.product_area is set, map directly to the
        matching option ID (case-insensitive, tolerate "&"/"and"). Do NOT
        re-classify when pre-tagged.
    If source == "generic":
      - title: concise summary of candidate.text (≤ 80 chars)
      - description: candidate.text + author + permalink
      - product_area: classify from text

  ============================================================
  BUG (reaction 🐛 → NET)
  ============================================================
  Pass to `create_bug_ticket`:
    - title: concise headline (≤ 80 chars)
        - source "ybug":     "Ybug - " + candidate.pre_title
        - source "template": candidate.pre_title verbatim
        - source "generic":  brief summary of candidate.text
    - description: candidate.text + author + permalink

  No project/issuetype/field IDs needed for bugs — `create_bug_ticket`
  fills them server-side (project NET, issue type Bug).

  ============================================================
  FINAL SUMMARY (markdown)
  ============================================================
  List each candidate with the outcome. Include the kind:
    - 💡 <slack-permalink> → MPR-NNN  https://myrspoven.atlassian.net/browse/MPR-NNN
    - 🐛 <slack-permalink> → NET-NNN  https://myrspoven.atlassian.net/browse/NET-NNN
    - <slack-permalink> → FAILED: <reason>  (on failure)
  If no candidates, just say so.

tools:
  - type: custom
    name: get_reaction_candidates
    description: |
      Fetch Slack messages from a channel posted within the last N hours that
      have a 💡 (`bulb`) OR 🐛 (`bug`) emoji reaction. Returns each candidate
      with its `reaction` type, source (ybug / template / generic), pre-extracted
      title/product_area when available, text body, author, permalink, and
      slack_channel_id + slack_ts for posting confirmation replies.
    input_schema:
      type: object
      properties:
        channel:
          type: string
          description: 'Channel name without the # prefix'
        since_hours:
          type: integer
          description: 'How far back to look in hours (default 24)'
      required:
        - channel

  - type: custom
    name: create_polaris_idea
    description: |
      Create a Jira Polaris idea in the given project AND post a confirmation
      reply in the original Slack thread. Returns the new issue key and URL
      on success. Always pass slack_channel_id and slack_ts from the
      candidate so the reply is threaded correctly.
    input_schema:
      type: object
      properties:
        project_key: { type: string }
        idea_issue_type_id: { type: string }
        title: { type: string }
        description: { type: string }
        product_area_field_id: { type: string }
        product_area_option_id: { type: string }
        planning_status_option_id: { type: string }
        slack_channel_id:
          type: string
          description: 'From candidate.slack_channel_id'
        slack_ts:
          type: string
          description: 'From candidate.slack_ts'
      required:
        - project_key
        - idea_issue_type_id
        - title
        - description
        - product_area_field_id
        - product_area_option_id
        - planning_status_option_id
        - slack_channel_id
        - slack_ts

  - type: custom
    name: create_bug_ticket
    description: |
      Create a Jira Bug ticket in project NET AND post a confirmation reply
      in the original Slack thread. Project (NET) and issue type (Bug,
      id=10004) are filled server-side — you only provide title (summary)
      and description. Returns the new issue key and URL on success.
    input_schema:
      type: object
      properties:
        title:
          type: string
          description: 'Bug summary (becomes the Jira "summary" field). ≤ 80 chars.'
        description:
          type: string
          description: 'Plain-text body; will be wrapped in ADF. Include author and Slack permalink.'
        slack_channel_id:
          type: string
          description: 'From candidate.slack_channel_id'
        slack_ts:
          type: string
          description: 'From candidate.slack_ts'
      required:
        - title
        - description
        - slack_channel_id
        - slack_ts
