name: Capture Slack ideas/bugs

on:
  schedule:
    # 05:17 UTC daily ≈ 06:17 (winter) / 07:17 (summer) Stockholm.
    # Off the top-of-hour to reduce GitHub Actions cron queue delays.
    - cron: "17 5 * * *"
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npm run capture
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          ATLASSIAN_SITE: ${{ secrets.ATLASSIAN_SITE }}
          ATLASSIAN_EMAIL: ${{ secrets.ATLASSIAN_EMAIL }}
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AGENT_ID: ${{ secrets.AGENT_ID }}
          ENV_ID: ${{ secrets.ENV_ID }}
